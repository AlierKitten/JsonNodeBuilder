name: Build and Release

on:
  push:
    tags:
      - "*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows-x64:
    name: Windows x64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    - name: Build NSIS installer
      run: cargo tauri build --verbose --bundles nsis
      working-directory: src-tauri
    - name: Create Portable zip
      run: |
        $version = "${{ github.ref_name }}"
        $exePath = "src-tauri/target/release/JsonNodeBuilder.exe"
        $zipName = "JsonNodeBuilder-${version}-windows-Portable_x64.zip"
        $zipPath = "src-tauri/target/release/bundle/${zipName}"
        Compress-Archive -Path $exePath -DestinationPath $zipPath
    - name: Rename installer
      run: |
        $file = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
        $version = "${{ github.ref_name }}"
        $newName = "JsonNodeBuilder-${version}-windows-setup_x64.exe"
        Rename-Item -Path $file.FullName -NewName $newName
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          src-tauri/target/release/bundle/nsis/*.exe
          src-tauri/target/release/bundle/*.zip

  build-windows-arm64:
    name: Windows ARM64
    runs-on: windows-11-arm
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    - name: Build NSIS installer for ARM64
      run: cargo tauri build --verbose --bundles nsis
      working-directory: src-tauri
    - name: Create Portable zip
      run: |
        $version = "${{ github.ref_name }}"
        $exePath = "src-tauri/target/release/JsonNodeBuilder.exe"
        $zipName = "JsonNodeBuilder-${version}-windows-Portable_arm64.zip"
        $zipPath = "src-tauri/target/release/bundle/${zipName}"
        Compress-Archive -Path $exePath -DestinationPath $zipPath
    - name: Rename installer
      run: |
        $file = Get-ChildItem -Path "src-tauri/target/release/bundle/nsis" -Filter "*.exe" | Select-Object -First 1
        $version = "${{ github.ref_name }}"
        $newName = "JsonNodeBuilder-${version}-windows-setup_arm64.exe"
        Rename-Item -Path $file.FullName -NewName $newName
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          src-tauri/target/release/bundle/nsis/*.exe
          src-tauri/target/release/bundle/*.zip

  build-linux-x64:
    name: Linux x64 (DEB + RPM)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf rpm
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    - name: Build DEB and RPM packages
      run: cargo tauri build --verbose --bundles deb,rpm
      working-directory: src-tauri
    - name: Rename packages
      run: |
        VERSION="${{ github.ref_name }}"
        # Rename DEB package
        DEB_FILE=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
        mv "$DEB_FILE" "src-tauri/target/release/bundle/deb/JsonNodeBuilder-${VERSION}-linux_x64.deb"
        # Rename RPM package
        RPM_FILE=$(ls src-tauri/target/release/bundle/rpm/*.rpm | head -1)
        mv "$RPM_FILE" "src-tauri/target/release/bundle/rpm/JsonNodeBuilder-${VERSION}-linux_x64.rpm"
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          src-tauri/target/release/bundle/deb/*.deb
          src-tauri/target/release/bundle/rpm/*.rpm

  build-linux-arm64:
    name: Linux ARM64 (DEB + RPM)
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libappindicator3-dev \
          librsvg2-dev \
          patchelf \
          rpm
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Install Tauri CLI
      run: cargo install tauri-cli
    - name: Build DEB and RPM packages for ARM64
      run: cargo tauri build --verbose --bundles deb,rpm
      working-directory: src-tauri
    - name: Rename packages
      run: |
        VERSION="${{ github.ref_name }}"
        # Rename DEB package
        DEB_FILE=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
        mv "$DEB_FILE" "src-tauri/target/release/bundle/deb/JsonNodeBuilder-${VERSION}-linux_arm64.deb"
        # Rename RPM package
        RPM_FILE=$(ls src-tauri/target/release/bundle/rpm/*.rpm | head -1)
        mv "$RPM_FILE" "src-tauri/target/release/bundle/rpm/JsonNodeBuilder-${VERSION}-linux_arm64.rpm"
    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        files: |
          src-tauri/target/release/bundle/deb/*.deb
          src-tauri/target/release/bundle/rpm/*.rpm

  update-release-body:
    name: Update Release Body
    runs-on: ubuntu-latest
    needs: [build-windows-x64, build-windows-arm64, build-linux-x64, build-linux-arm64]
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          echo "Current tag: $CURRENT_TAG"
          
          # Get all tags sorted by version
          git fetch --tags
          ALL_TAGS=$(git tag --sort=-v:refname)
          
          # Find previous tag
          PREVIOUS_TAG=""
          FOUND_CURRENT=false
          for tag in $ALL_TAGS; do
            if [ "$tag" = "$CURRENT_TAG" ]; then
              FOUND_CURRENT=true
            elif [ "$FOUND_CURRENT" = true ]; then
              PREVIOUS_TAG="$tag"
              break
            fi
          done
          
          echo "Previous tag: $PREVIOUS_TAG"
          
          # Generate changelog
          CHANGELOG=""
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --oneline --pretty=format:"- %s" "$PREVIOUS_TAG".."$CURRENT_TAG" 2>/dev/null || echo "")
          else
            # First tag, get all commits
            CHANGELOG=$(git log --oneline --pretty=format:"- %s" 2>/dev/null || echo "")
          fi
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Initial release"
          fi
          
          # Escape for GitHub Actions output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update release body
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📝 Change Log
            ${{ steps.changelog.outputs.changelog }}

            ## 📥 Downloads

            ### Windows
            - **Windows x64**: [Installer (.exe)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-windows-setup_x64.exe), [Portable (.zip)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-windows-Portable_x64.zip)
            - **Windows ARM64**: [Installer (.exe)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-windows-setup_arm64.exe), [Portable (.zip)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-windows-Portable_arm64.zip)
            
            ### Linux
            - **Linux x64**: [DEB package (.deb)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-linux_x64.deb), [RPM package (.rpm)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-linux_x64.rpm)
            - **Linux ARM64**: [DEB package (.deb)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-linux_arm64.deb), [RPM package (.rpm)](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/JsonNodeBuilder-${{ github.ref_name }}-linux_arm64.rpm)

            ---
            *Auto built with GitHub Actions*
