name: Rust Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: cargo test --verbose --manifest-path src-tauri/Cargo.toml
