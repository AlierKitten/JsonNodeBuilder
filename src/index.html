<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>Visual JSON Builder Pro</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="stylesheet" href="css/node.css">
    <link rel="stylesheet" href="css/sidebar.css">
</head>

<body>
    <div id="app">
        <div id="canvas-container">
            <div id="canvas-content">
                <svg id="lines-svg"></svg>
                <div id="nodes-layer"></div>
            </div>
        </div>
        <div id="sidebar">
            <div class="sidebar-header">
                <span>JSON 源码</span>
                <div class="sidebar-actions">
                    <button class="btn-format" id="format-btn" onclick="formatJSON()">格式化</button>
                    <button class="btn-copy" id="copy-btn" onclick="copyJSON()">复制</button>
                </div>
            </div>
            <div id="json-container">
                <div id="line-numbers"></div>
                <div id="json-editor">
                    <div id="json-highlight"></div>
                    <textarea id="json-input" spellcheck="false" placeholder="输入JSON源码..."></textarea>
                </div>
            </div>
            <div id="json-error-bar" class="json-error-bar"></div>
        </div>
    </div>
    <div id="zoom-info">Ctrl+滚轮: 缩放 | 拖动: 移动画布</div>
    <script src="js/state.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/node-render.js"></script>
    <script src="js/json-builder.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
